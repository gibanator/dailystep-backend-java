spring:
  application:
    name: dailystep-backend-java

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    callback-locations: classpath:db/migration

  devtools:
    livereload:
      enabled: false

  web:
    error:
      include-message: always
      include-stacktrace: never
      include-path: never