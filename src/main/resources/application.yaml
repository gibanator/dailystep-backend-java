spring:
  application:
    name: dailystep-backend-java

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    callback-locations: classpath:db/migration

  devtools:
    livereload:
      enabled: false

  web:
    error:
      include-message: always
      include-stacktrace: never
      include-path: never

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_SENDER_ADDRESS}
    password: ${EMAIL_SENDER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000